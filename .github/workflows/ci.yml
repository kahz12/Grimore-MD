name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.8,<1.0"
      - name: ruff check
        run: ruff check grimore

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # serve + vec are pure-wheel extras that let the API and
          # sqlite-vec tests actually run instead of auto-skipping.
          # reranker (torch), ocr, and the e2e (live Ollama) suites stay
          # opt-in and continue to auto-skip here.
          pip install -e ".[serve,vec]"
          pip install pytest pytest-mock
      - name: Run tests
        run: pytest -q
