name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.8,<1.0"
      - name: ruff check
        run: ruff check grimore

  typecheck:
    name: Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Stub packages for typed use of requests / yaml in the gated
          # modules. The gate itself (which packages must be clean) lives
          # in [tool.mypy] overrides in pyproject.toml.
          pip install "mypy>=2.3,<3" types-requests types-PyYAML
      - name: mypy (gated: grimore.memory, grimore.utils)
        run: mypy grimore

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # starlette + httpx let the HTTP API tests run (they import-skip
          # without them). The vec (sqlite-vec), reranker (torch), ocr, and
          # e2e (live Ollama) suites need native libs or external services,
          # so they stay opt-in and auto-skip here.
          pip install pytest pytest-mock pytest-cov starlette httpx
      - name: Run tests
        # Coverage is report-only (config in [tool.coverage.*]); the summary
        # lands in the job log so drift is visible per-PR without gating.
        run: pytest -q --cov --cov-report=term
