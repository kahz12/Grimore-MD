name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.8,<1.0"
      - name: ruff check
        run: ruff check grimore

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # starlette + httpx let the HTTP API tests run (they import-skip
          # without them). The vec (sqlite-vec), reranker (torch), ocr, and
          # e2e (live Ollama) suites need native libs or external services,
          # so they stay opt-in and auto-skip here.
          pip install pytest pytest-mock starlette httpx
      - name: Run tests
        run: pytest -q
